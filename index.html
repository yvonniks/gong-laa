<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>講啦 GóngLaa — Cantonese Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..900&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+HK:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --tile:    #ecefe7;   /* pale HK-tile green-grey page */
    --plate:   #fdfdfa;   /* minibus plate white */
    --blue:    #1f3f97;   /* minibus destination blue */
    --blue-dk: #162f74;
    --red:     #d6402f;   /* minibus route-number red */
    --red-dk:  #b23122;
    --ink:     #23262b;
    --muted:   #6e756b;
    --line:    #cfd4c5;
    --line-soft: #dde1d4;
    --green:   #2c7a4b;
    --green-bg:#e3efe6;
    --red-bg:  #f9e6e2;
    --blue-bg: #e5eaf7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { -webkit-text-size-adjust: 100%; }

  body {
    background: var(--tile);
    background-image: linear-gradient(var(--line-soft) 1px, transparent 1px),
                      linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
    background-size: 44px 44px;
    color: var(--ink);
    font-family: 'Archivo', 'Noto Sans HK', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .zh { font-family: 'Noto Sans HK', sans-serif; }
  .mono { font-family: 'IBM Plex Mono', monospace; }

  button { font: inherit; cursor: pointer; }
  button:focus-visible, .chip:focus-visible {
    outline: 3px solid var(--blue);
    outline-offset: 2px;
  }

  /* ───── HEADER ───── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 28px;
    border-bottom: 2px solid var(--ink);
    background: var(--plate);
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-plate {
    background: var(--plate);
    border: 2.5px solid var(--blue);
    box-shadow: 0 0 0 3px var(--plate), 0 0 0 4.5px var(--ink);
    border-radius: 8px;
    padding: 4px 12px;
    font-family: 'Noto Sans HK', sans-serif;
    font-weight: 900;
    font-size: 22px;
    line-height: 1.2;
    color: var(--blue);
    letter-spacing: 2px;
    user-select: none;
  }
  .brand-plate em { font-style: normal; color: var(--red); }
  .brand-copy { display: flex; flex-direction: column; }
  .brand-name {
    font-weight: 800;
    font-stretch: 115%;
    font-size: 17px;
    letter-spacing: 0.4px;
    text-transform: lowercase;
  }
  .brand-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .voice-pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    border: 1.5px solid var(--line);
    border-radius: 999px;
    background: var(--plate);
    color: var(--muted);
    padding: 6px 12px;
    display: flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
  }
  .voice-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex: none; }
  .voice-pill.ok    .voice-dot { background: var(--green); }
  .voice-pill.warn  .voice-dot { background: #c98a1b; }
  .voice-pill.bad   .voice-dot { background: var(--red); }

  /* ───── MODE + LEVEL BAR ───── */
  .control-bar {
    max-width: 900px;
    width: 100%;
    margin: 26px auto 0;
    padding: 0 20px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }
  .mode-switch {
    display: flex;
    border: 2px solid var(--ink);
    border-radius: 10px;
    overflow: hidden;
    background: var(--plate);
  }
  .mode-btn {
    border: none;
    background: transparent;
    padding: 9px 20px;
    font-weight: 700;
    font-stretch: 110%;
    font-size: 14px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s, color 0.15s;
  }
  .mode-btn .zh { font-size: 15px; font-weight: 700; }
  .mode-btn + .mode-btn { border-left: 2px solid var(--ink); }
  .mode-btn.active { background: var(--blue); color: #fff; }

  .level-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
  .level-btn {
    border: 1.5px solid var(--line);
    background: var(--plate);
    border-radius: 999px;
    padding: 7px 15px;
    font-weight: 600;
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: baseline;
    gap: 6px;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .level-btn .zh { font-size: 12px; }
  .level-btn .count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--muted);
  }
  .level-btn:hover { border-color: var(--blue); color: var(--blue); }
  .level-btn.active {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }
  .level-btn.active .count { color: #ffd9d3; }

  /* ───── SUB CONTROLS (words only) ───── */
  .sub-bar {
    max-width: 900px;
    width: 100%;
    margin: 16px auto 0;
    padding: 0 20px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
  }
  .dir-switch {
    display: flex;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
    background: var(--plate);
    flex: none;
  }
  .dir-btn {
    border: none;
    background: transparent;
    padding: 6px 13px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .dir-btn + .dir-btn { border-left: 1.5px solid var(--line); }
  .dir-btn.active { background: var(--blue-bg); color: var(--blue); font-weight: 600; }

  .chip-row { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip {
    border: 1.5px solid var(--line);
    background: var(--plate);
    border-radius: 999px;
    padding: 5px 13px;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .chip .zh { font-size: 12px; }
  .chip:hover { border-color: var(--blue); color: var(--blue); }
  .chip.active { background: var(--blue); border-color: var(--blue); color: #fff; }

  /* ───── STAGE ───── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 26px 20px 40px;
    width: 100%;
  }
  .stage { width: 100%; max-width: 660px; }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .progress-track {
    flex: 1;
    height: 8px;
    border: 1.5px solid var(--ink);
    border-radius: 999px;
    background: var(--plate);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--red);
    transition: width 0.25s ease;
  }
  .progress-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ───── THE PLATE (flashcard) ───── */
  .plate {
    position: relative;
    background: var(--plate);
    border: 2.5px solid var(--ink);
    border-radius: 18px;
    padding: 14px;
    box-shadow: 6px 6px 0 rgba(35, 38, 43, 0.16);
  }
  .plate-inner {
    border: 3px solid var(--blue);
    border-radius: 10px;
    min-height: 340px;
    padding: 46px 34px 38px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
  }
  .bolt {
    position: absolute;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--tile);
    border: 1.5px solid var(--ink);
  }
  .bolt.tl { top: 7px; left: 7px; }
  .bolt.tr { top: 7px; right: 7px; }
  .bolt.bl { bottom: 7px; left: 7px; }
  .bolt.br { bottom: 7px; right: 7px; }

  .route-chip {
    position: absolute;
    top: -16px;
    left: 28px;
    background: var(--red);
    color: #fff;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 13px;
    padding: 5px 13px;
    border-radius: 8px;
    border: 2px solid var(--ink);
    letter-spacing: 0.5px;
  }
  .deck-chip {
    position: absolute;
    top: -14px;
    right: 28px;
    background: var(--plate);
    color: var(--blue);
    font-weight: 700;
    font-stretch: 112%;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 8px;
    border: 2px solid var(--blue);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .prompt-eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--red);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .big-char {
    font-family: 'Noto Sans HK', sans-serif;
    font-weight: 900;
    color: var(--blue);
    font-size: clamp(56px, 12vw, 92px);
    line-height: 1.15;
    letter-spacing: 4px;
    word-break: keep-all;
  }
  .big-char.long { font-size: clamp(30px, 6vw, 46px); letter-spacing: 2px; line-height: 1.5; }
  .big-en {
    font-weight: 800;
    font-stretch: 115%;
    font-size: clamp(26px, 5vw, 38px);
    color: var(--blue);
    line-height: 1.3;
    max-width: 30ch;
  }
  .hint {
    margin-top: 26px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .hint kbd {
    font-family: inherit;
    border: 1.5px solid var(--line);
    border-bottom-width: 3px;
    border-radius: 5px;
    padding: 1px 7px;
    background: var(--plate);
  }

  .jyutping {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: clamp(17px, 3vw, 22px);
    color: var(--red);
    margin-top: 14px;
    letter-spacing: 0.5px;
  }
  .meaning {
    font-weight: 700;
    font-stretch: 110%;
    font-size: clamp(18px, 3.4vw, 24px);
    color: var(--ink);
    margin-top: 10px;
  }
  .speak-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    margin-top: 20px;
    border: 2px solid var(--ink);
    border-radius: 999px;
    background: var(--plate);
    padding: 8px 18px;
    font-weight: 700;
    font-size: 13.5px;
    color: var(--ink);
    transition: background 0.15s;
  }
  .speak-btn:hover { background: var(--blue-bg); }
  .speak-btn svg { width: 16px; height: 16px; fill: var(--red); }

  .example-box {
    margin-top: 26px;
    padding-top: 20px;
    border-top: 1.5px dashed var(--line);
    width: 100%;
    max-width: 480px;
  }
  .example-zh {
    font-family: 'Noto Sans HK', sans-serif;
    font-weight: 500;
    font-size: 19px;
    color: var(--ink);
    line-height: 1.7;
  }
  .example-zh .hl { color: var(--red); font-weight: 700; }
  .example-jp {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    color: var(--blue);
    margin-top: 8px;
    line-height: 1.7;
  }
  .example-en { font-size: 14px; color: var(--muted); margin-top: 8px; line-height: 1.6; }
  .example-speak {
    border: none;
    background: none;
    color: var(--red);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    margin-top: 10px;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .example-speak:hover { color: var(--red-dk); }
  .phrase-note {
    margin-top: 18px;
    font-size: 13px;
    color: var(--muted);
    background: var(--tile);
    border: 1.5px solid var(--line);
    border-radius: 8px;
    padding: 10px 14px;
    max-width: 460px;
    line-height: 1.6;
  }

  /* ───── ACTION ROW ───── */
  .actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 22px;
    flex-wrap: wrap;
  }
  .btn {
    border: 2px solid var(--ink);
    border-radius: 12px;
    padding: 13px 26px;
    font-weight: 800;
    font-stretch: 112%;
    font-size: 15px;
    background: var(--plate);
    color: var(--ink);
    box-shadow: 3px 3px 0 rgba(35,38,43,0.18);
    transition: transform 0.08s, box-shadow 0.08s, background 0.15s;
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 rgba(35,38,43,0.18); }
  .btn .key {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 11px;
    border: 1.5px solid currentColor;
    border-radius: 5px;
    padding: 1px 6px;
    opacity: 0.75;
  }
  .btn-reveal { background: var(--blue); border-color: var(--blue-dk); color: #fff; padding: 13px 40px; }
  .btn-reveal:hover { background: var(--blue-dk); }
  .btn-good { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .btn-good:hover { background: #d3e7d9; }
  .btn-again { background: var(--red-bg); color: var(--red-dk); border-color: var(--red-dk); }
  .btn-again:hover { background: #f3d6d0; }
  .btn-skip { font-weight: 600; color: var(--muted); border-color: var(--line); box-shadow: none; }
  .btn-skip:hover { color: var(--ink); }

  /* ───── STATS STRIP ───── */
  .stats {
    display: flex;
    justify-content: center;
    gap: 26px;
    margin-top: 26px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    color: var(--muted);
    flex-wrap: wrap;
  }
  .stats b { color: var(--ink); font-weight: 600; }
  .stats .good b { color: var(--green); }
  .stats .bad b { color: var(--red); }

  .footer-hints {
    text-align: center;
    padding: 18px 20px 26px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    color: var(--muted);
    line-height: 2;
  }
  .footer-hints kbd {
    font-family: inherit;
    border: 1.5px solid var(--line);
    border-bottom-width: 3px;
    border-radius: 5px;
    padding: 0 6px;
    background: var(--plate);
    margin: 0 2px;
  }

  /* ───── DONE PANEL ───── */
  .done-title {
    font-family: 'Noto Sans HK', sans-serif;
    font-weight: 900;
    font-size: 44px;
    color: var(--blue);
    letter-spacing: 4px;
  }
  .done-sub { margin-top: 10px; font-weight: 700; font-stretch: 112%; font-size: 18px; color: var(--ink); }
  .done-stats {
    display: flex;
    gap: 34px;
    margin-top: 26px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .done-stat { text-align: center; }
  .done-stat .num { font-weight: 800; font-stretch: 115%; font-size: 34px; color: var(--blue); }
  .done-stat .num.good { color: var(--green); }
  .done-stat .num.bad { color: var(--red); }
  .done-stat .lbl { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 26px;
    transform: translateX(-50%) translateY(90px);
    background: var(--plate);
    border: 2px solid var(--ink);
    border-radius: 10px;
    padding: 10px 20px;
    font-weight: 700;
    font-size: 14px;
    box-shadow: 4px 4px 0 rgba(35,38,43,0.18);
    transition: transform 0.25s ease;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.good { color: var(--green); border-color: var(--green); }
  .toast.bad { color: var(--red-dk); border-color: var(--red-dk); }

  .empty-msg {
    font-weight: 600;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.7;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }

  @media (max-width: 640px) {
    header { padding: 12px 16px; }
    .brand-tag { display: none; }
    .voice-pill span.vp-text { max-width: 130px; overflow: hidden; text-overflow: ellipsis; }
    .control-bar, .sub-bar { padding: 0 14px; }
    .plate-inner { padding: 40px 18px 30px; min-height: 300px; }
    .route-chip { left: 16px; }
    .deck-chip { right: 16px; }
    .btn { padding: 12px 18px; font-size: 14px; }
    .btn .key { display: none; }
    main { padding: 22px 14px 34px; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeUp 0.22s ease; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-plate">講<em>啦!</em></div>
    <div class="brand-copy">
      <span class="brand-name">góng laa — say it!</span>
      <span class="brand-tag">cantonese flashcards · jyutping · audio</span>
    </div>
  </div>
  <div class="header-right">
    <div class="voice-pill" id="voicePill" title="Audio uses your device's built-in Cantonese voice. On iPhone/Mac: Settings → Accessibility → Spoken Content → Voices → Chinese (Hong Kong).">
      <span class="voice-dot"></span><span class="vp-text" id="voicePillText">checking voice…</span>
    </div>
  </div>
</header>

<div class="control-bar">
  <div class="mode-switch" role="tablist" aria-label="Study mode">
    <button class="mode-btn active" id="modeWords" role="tab" aria-selected="true"><span class="zh">生字</span> Words</button>
    <button class="mode-btn" id="modePhrases" role="tab" aria-selected="false"><span class="zh">講嘢</span> Phrases</button>
  </div>
  <div class="level-tabs" id="levelTabs"></div>
</div>

<div class="sub-bar" id="subBar">
  <div class="dir-switch" id="dirSwitch">
    <button class="dir-btn active" data-dir="en2zh" title="See English, produce Cantonese">EN → 中</button>
    <button class="dir-btn" data-dir="zh2en" title="See the character, recall the meaning">中 → EN</button>
  </div>
  <div class="chip-row" id="chipRow"></div>
</div>

<main>
  <div class="stage">
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">0 / 0</div>
    </div>

    <div class="plate">
      <div class="route-chip" id="routeChip">1 / 1</div>
      <div class="deck-chip" id="deckChip">Beginner</div>
      <div class="plate-inner" id="plateInner">
        <span class="bolt tl"></span><span class="bolt tr"></span><span class="bolt bl"></span><span class="bolt br"></span>
        <div id="cardBody"></div>
      </div>
    </div>

    <div class="actions" id="actionRow"></div>

    <div class="stats">
      <span>seen <b id="statSeen">0</b></span>
      <span class="good">got it <b id="statGood">0</b></span>
      <span class="bad">again <b id="statBad">0</b></span>
      <span>accuracy <b id="statAcc">–</b></span>
    </div>
  </div>
</main>

<div class="footer-hints">
  <kbd>space</kbd> reveal / replay &nbsp; <kbd>1</kbd> got it &nbsp; <kbd>2</kbd> again &nbsp; <kbd>→</kbd> skip &nbsp; <kbd>p</kbd> play audio
  <br>audio needs a Cantonese (zh-HK) voice on your device — most phones &amp; Macs have one built in
</div>

<div class="toast" id="toast"></div>

<script>
const WORDS = [
{zh:"眼",jp:"ngaan5",en:"eye",ex:"我對眼好攰。",exj:"ngo5 deoi3 ngaan5 hou2 gui6",exen:"My eyes are really tired.",cat:"body",lv:"Beginner"},
{zh:"耳仔",jp:"ji5 zai2",en:"ear",ex:"隻兔仔有對長耳仔。",exj:"zek3 tou3 zai2 jau5 deoi3 coeng4 ji5 zai2",exen:"The rabbit has a pair of long ears.",cat:"body",lv:"Beginner"},
{zh:"手",jp:"sau2",en:"hand",ex:"食飯之前要洗手。",exj:"sik6 faan6 zi1 cin4 jiu3 sai2 sau2",exen:"Wash your hands before eating.",cat:"body",lv:"Beginner"},

{en:"Living in a big city has its pros and cons.",zh:"喺大城市生活有好有唔好。",jp:"hai2 daai6 sing4 si5 sang1 wut6 jau5 hou2 jau5 m4 hou2",lv:"Advanced"},
{en:"I was planning to go out, but then it started pouring.",zh:"我本來打算出街，點知落起大雨。",jp:"ngo5 bun2 loi4 daa2 syun3 ceot1 gaai1, dim2 zi1 lok6 hei2 daai6 jyu5",lv:"Advanced"}

const LEVELS = ["Beginner","Elementary","Intermediate","Advanced"];
const LEVEL_ZH = {Beginner:"入門",Elementary:"初級",Intermediate:"中級",Advanced:"高級"};
const CATEGORIES = [
["all","全部","All"],["body","身體","Body"],["nature","大自然","Nature"],["weather","天氣","Weather"],
["animals","動物","Animals"],["verbs","動作","Actions"],["people","人物","People"],["questions","疑問","Questions"],
["objects","用品","Things"],["food","飲食","Food"],["time","時間","Time"],["numbers","數字","Numbers"],
["places","地方","Places"],["greetings","禮貌","Politeness"],["adjectives","形容","Describing"],
["colors","顏色","Colours"],["mind","思想","Mind"],["society","社會","Society"]
];

const S = {
  mode: "words",
  level: "Beginner",
  category: "all",
  direction: "en2zh",
  deck: [],
  pos: 0,
  revealed: false,
  done: false,
  seen: 0,
  good: 0,
  bad: 0
};

const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pool(mode, level, category){
  if (mode === "phrases") return PHRASES.filter(p => p.lv === level);
  return WORDS.filter(w => w.lv === level && (category === "all" || w.cat === category));
}

function buildDeck(){
  S.deck = shuffle(pool(S.mode, S.level, S.category));
  S.pos = 0;
  S.revealed = false;
  S.done = false;
  S.seen = 0; S.good = 0; S.bad = 0;
  render();
}

/* ── speech ── */
let voices = [];
let voiceStatus = "checking";
function refreshVoices(){
  if (!("speechSynthesis" in window)){ voiceStatus = "none"; paintVoicePill(); return; }
  voices = speechSynthesis.getVoices();
  const canto = pickCanto();
  if (canto) voiceStatus = "canto";
  else if (voices.some(v => /^zh/i.test(v.lang))) voiceStatus = "mandarin";
  else if (voices.length === 0) voiceStatus = "checking";
  else voiceStatus = "none";
  paintVoicePill();
}
function pickCanto(){
  return voices.find(v => /yue/i.test(v.lang)) ||
         voices.find(v => /zh[-_]?HK/i.test(v.lang)) ||
         null;
}
function pickFallback(){
  return voices.find(v => /zh[-_]?TW/i.test(v.lang)) ||
         voices.find(v => /^zh/i.test(v.lang)) ||
         null;
}
function paintVoicePill(){
  const pill = $("voicePill"), txt = $("voicePillText");
  pill.classList.remove("ok","warn","bad");
  if (voiceStatus === "canto"){ pill.classList.add("ok"); txt.textContent = "粵語 voice ready"; }
  else if (voiceStatus === "mandarin"){ pill.classList.add("warn"); txt.textContent = "Mandarin voice fallback"; }
  else if (voiceStatus === "checking"){ txt.textContent = "checking voice…"; }
  else { pill.classList.add("bad"); txt.textContent = "no Chinese voice found"; }
}
function speak(text){
  if (!("speechSynthesis" in window)) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const v = pickCanto() || pickFallback();
    if (v) u.voice = v;
    u.lang = v ? v.lang : "zh-HK";
    u.rate = 0.82;
    speechSynthesis.speak(u);
  } catch(e){ /* speech unavailable */ }
}
if ("speechSynthesis" in window){
  speechSynthesis.onvoiceschanged = refreshVoices;
}
refreshVoices();
setTimeout(refreshVoices, 600);

/* ── helpers ── */
function card(){ return S.deck[S.pos] || null; }
function cantoSideOfCard(c){ return S.mode === "phrases" ? c.zh : c.zh; }
function highlight(sentence, zh){
  const safe = esc(sentence);
  const target = esc(zh);
  return safe.includes(target) ? safe.replace(target, '<span class="hl">' + target + '</span>') : safe;
}

/* ── render ── */
function render(){
  renderLevelTabs();
  renderSubBar();
  renderProgress();
  renderCard();
  renderStats();
}

function renderLevelTabs(){
  const wrap = $("levelTabs");
  wrap.innerHTML = "";
  LEVELS.forEach(lv => {
    const n = pool(S.mode, lv, S.mode === "words" ? S.category : "all").length;
    const b = document.createElement("button");
    b.className = "level-btn" + (S.level === lv ? " active" : "");
    b.innerHTML = '<span class="zh">' + LEVEL_ZH[lv] + '</span> ' + lv + ' <span class="count">' + n + '</span>';
    b.addEventListener("click", () => { S.level = lv; buildDeck(); });
    wrap.appendChild(b);
  });
  $("modeWords").classList.toggle("active", S.mode === "words");
  $("modeWords").setAttribute("aria-selected", S.mode === "words");
  $("modePhrases").classList.toggle("active", S.mode === "phrases");
  $("modePhrases").setAttribute("aria-selected", S.mode === "phrases");
}

function renderSubBar(){
  const sub = $("subBar");
  sub.style.display = S.mode === "words" ? "" : "none";
  if (S.mode !== "words") return;
  document.querySelectorAll(".dir-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.dir === S.direction);
  });
  const row = $("chipRow");
  row.innerHTML = "";
  CATEGORIES.forEach(([key, zh, en]) => {
    if (key !== "all" && !WORDS.some(w => w.cat === key && w.lv === S.level)) return;
    const c = document.createElement("button");
    c.className = "chip" + (S.category === key ? " active" : "");
    c.innerHTML = '<span class="zh">' + zh + '</span> ' + en;
    c.addEventListener("click", () => { S.category = key; buildDeck(); });
    row.appendChild(c);
  });
}

function renderProgress(){
  const total = S.deck.length;
  const donePart = S.done ? total : S.pos;
  $("progressFill").style.width = total ? (donePart / total * 100) + "%" : "0%";
  $("progressLabel").textContent = total ? (S.done ? total : S.pos + 1) + " / " + total : "0 / 0";
  $("routeChip").textContent = total ? (S.done ? total : S.pos + 1) + " / " + total : "– / –";
  $("deckChip").textContent = LEVEL_ZH[S.level] + " " + S.level;
}

function renderCard(){
  const body = $("cardBody");
  const actions = $("actionRow");
  const c = card();

  if (S.deck.length === 0){
    body.innerHTML = '<div class="empty-msg">No cards here yet.<br>Try another level or category.</div>';
    actions.innerHTML = "";
    return;
  }

  if (S.done){
    const answered = S.good + S.bad;
    const acc = answered ? Math.round(S.good / answered * 100) + "%" : "–";
    body.innerHTML =
      '<div class="done-title fade-in">好叻呀！</div>' +
      '<div class="done-sub">hou2 lek1 aa3 — deck complete!</div>' +
      '<div class="done-stats">' +
        '<div class="done-stat"><div class="num">' + S.seen + '</div><div class="lbl">seen</div></div>' +
        '<div class="done-stat"><div class="num good">' + S.good + '</div><div class="lbl">got it</div></div>' +
        '<div class="done-stat"><div class="num bad">' + S.bad + '</div><div class="lbl">again</div></div>' +
        '<div class="done-stat"><div class="num">' + acc + '</div><div class="lbl">accuracy</div></div>' +
      '</div>';
    actions.innerHTML = "";
    const again = document.createElement("button");
    again.className = "btn btn-reveal";
    again.textContent = "Shuffle and go again";
    again.addEventListener("click", buildDeck);
    actions.appendChild(again);
    return;
  }

  const frontIsCanto = (S.mode === "words" && S.direction === "zh2en");

  if (!S.revealed){
    if (frontIsCanto){
      body.innerHTML =
        '<div class="fade-in">' +
        '<div class="prompt-eyebrow">what does this mean?</div>' +
        '<div class="big-char' + (c.zh.length > 4 ? " long" : "") + '">' + esc(c.zh) + '</div>' +
        '<button class="speak-btn" id="speakMain">' + speakerSvg() + ' hear it</button>' +
        '<div class="hint">press <kbd>space</kbd> to reveal</div>' +
        '</div>';
      const sb = $("speakMain");
      if (sb) sb.addEventListener("click", e => { e.stopPropagation(); speak(c.zh); });
    } else {
      body.innerHTML =
        '<div class="fade-in">' +
        '<div class="prompt-eyebrow">say it in cantonese</div>' +
        '<div class="big-en">' + esc(c.en) + '</div>' +
        '<div class="hint">say it out loud, then press <kbd>space</kbd></div>' +
        '</div>';
    }
    actions.innerHTML = "";
    const reveal = document.createElement("button");
    reveal.className = "btn btn-reveal";
    reveal.innerHTML = 'Reveal <span class="key">space</span>';
    reveal.addEventListener("click", doReveal);
    const skip = document.createElement("button");
    skip.className = "btn btn-skip";
    skip.innerHTML = 'Skip <span class="key">→</span>';
    skip.addEventListener("click", doSkip);
    actions.appendChild(reveal);
    actions.appendChild(skip);
  } else {
    let html = '<div class="fade-in">';
    html += '<div class="big-char' + (c.zh.length > 4 ? " long" : "") + '">' + esc(c.zh) + '</div>';
    html += '<div class="jyutping">' + esc(c.jp) + '</div>';
    html += '<div class="meaning">' + esc(c.en) + '</div>';
    html += '<button class="speak-btn" id="speakMain">' + speakerSvg() + ' hear it again</button>';
    if (S.mode === "words"){
      html += '<div class="example-box">' +
        '<div class="example-zh">' + highlight(c.ex, c.zh) + '</div>' +
        '<div class="example-jp">' + esc(c.exj) + '</div>' +
        '<div class="example-en">' + esc(c.exen) + '</div>' +
        '<button class="example-speak" id="speakEx">play example sentence</button>' +
        '</div>';
    } else if (c.note){
      html += '<div class="phrase-note">' + esc(c.note) + '</div>';
    }
    html += '</div>';
    body.innerHTML = html;
    const sb = $("speakMain");
    if (sb) sb.addEventListener("click", () => speak(c.zh));
    const se = $("speakEx");
    if (se) se.addEventListener("click", () => speak(c.ex));

    actions.innerHTML = "";
    const good = document.createElement("button");
    good.className = "btn btn-good";
    good.innerHTML = '識 Got it <span class="key">1</span>';
    good.addEventListener("click", () => markCard(true));
    const bad = document.createElement("button");
    bad.className = "btn btn-again";
    bad.innerHTML = '唔識 Again <span class="key">2</span>';
    bad.addEventListener("click", () => markCard(false));
    actions.appendChild(good);
    actions.appendChild(bad);
  }
}

function speakerSvg(){
  return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4zM14 3.2v2.1c2.9.9 5 3.5 5 6.7s-2.1 5.8-5 6.7v2.1c4-.9 7-4.5 7-8.8s-3-7.9-7-8.8z"/></svg>';
}

function renderStats(){
  $("statSeen").textContent = S.seen;
  $("statGood").textContent = S.good;
  $("statBad").textContent = S.bad;
  const answered = S.good + S.bad;
  $("statAcc").textContent = answered ? Math.round(S.good / answered * 100) + "%" : "–";
}

/* ── actions ── */
function doReveal(){
  if (S.done || S.revealed || S.deck.length === 0) return;
  S.revealed = true;
  S.seen++;
  renderCard();
  renderStats();
  speak(card().zh);
}

function advance(){
  S.revealed = false;
  if (S.pos + 1 >= S.deck.length){
    S.done = true;
    if ("speechSynthesis" in window) speechSynthesis.cancel();
  } else {
    S.pos++;
  }
  renderProgress();
  renderCard();
}

function markCard(ok){
  if (!S.revealed || S.done) return;
  if (ok){ S.good++; toast("識咗！ nice one", "good"); }
  else { S.bad++; toast("下次得㗎 — it will stick", "bad"); }
  renderStats();
  advance();
}

function doSkip(){
  if (S.done || S.deck.length === 0) return;
  if ("speechSynthesis" in window) speechSynthesis.cancel();
  advance();
}

let toastTimer = null;
function toast(msg, kind){
  const t = $("toast");
  t.textContent = msg;
  t.className = "toast show " + kind;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = "toast"; }, 1400);
}

/* ── wiring ── */
$("modeWords").addEventListener("click", () => {
  if (S.mode === "words") return;
  S.mode = "words";
  buildDeck();
});
$("modePhrases").addEventListener("click", () => {
  if (S.mode === "phrases") return;
  S.mode = "phrases";
  buildDeck();
});
document.querySelectorAll(".dir-btn").forEach(b => {
  b.addEventListener("click", () => {
    if (S.direction === b.dataset.dir) return;
    S.direction = b.dataset.dir;
    buildDeck();
  });
});

document.addEventListener("keydown", e => {
  if (e.target && /^(input|textarea|select)$/i.test(e.target.tagName)) return;
  if (e.code === "Space"){
    e.preventDefault();
    if (S.done || S.deck.length === 0) return;
    if (!S.revealed) doReveal();
    else speak(card().zh);
  } else if (e.key === "1"){
    markCard(true);
  } else if (e.key === "2"){
    markCard(false);
  } else if (e.key === "ArrowRight"){
    e.preventDefault();
    doSkip();
  } else if (e.key === "p" || e.key === "P"){
    if (!S.done && S.deck.length){
      if (S.revealed || (S.mode === "words" && S.direction === "zh2en")) speak(card().zh);
    }
  }
});

buildDeck();
</script>
